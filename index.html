<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExcellentSMP Store</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060b06;
  --card:#0c140c;
  --green:#9cff00;
  --green2:#63c600;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:radial-gradient(circle at center,#0d160c,#000);
  font-family:'Press Start 2P', monospace;
  color:var(--green);
}
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px;
  border-bottom:2px solid var(--green2);
}
button, .btn{
  background:transparent;
  border:2px solid var(--green);
  color:var(--green);
  padding:10px 14px;
  cursor:pointer;
  font-size:10px;
}
button:hover,.btn:hover{background:var(--green);color:black}
.hero{text-align:center;padding:60px 20px}
.hero h1{font-size:42px;line-height:1.4;text-shadow:0 0 10px var(--green2)}
.panel{
  max-width:900px;margin:30px auto;padding:20px;
  border:2px solid var(--green2);background:var(--card)
}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{
  border:2px solid var(--green2);padding:16px;background:#091209;text-align:center
}
.card h3{margin-top:0}
.price{font-size:14px;margin:10px 0}
.footer{text-align:center;padding:20px;opacity:.6}
.status{font-size:12px;margin-top:10px}
.copy{margin-left:10px}
</style>
</head>
<body>
<header>
  <div>🟩 ExcellentSMP</div>
  <div>
    <a href="#store" class="btn">STORE</a>
    <a href="#status" class="btn">STATUS</a>
  </div>
</header>

<section class="hero">
  <h1>EXCELLENT SMP</h1>
  <p>Pure survival. Real community. Endless adventure.</p>
  <p>Server IP: <span id="ip">excellentsmp.mineserver.uno</span>
  <button class="copy" onclick="copyIP()">COPY</button></p>
</section>

<section id="status" class="panel">
  <h2>SERVER STATUS</h2>
  <div class="status" id="serverStatus">Checking...</div>
</section>

<section id="store" class="panel">
  <h2>STORE</h2>
  <div class="grid">
    <div class="card"><h3>VIP</h3><div class="price">$0.99</div><button>Buy</button></div>
    <div class="card"><h3>MVP</h3><div class="price">$4.99</div><button>Buy</button></div>
    <div class="card"><h3>ELITE</h3><div class="price">$9.99</div><button>Buy</button></div>
    <div class="card"><h3>LEGEND</h3><div class="price">$14.99</div><button>Buy</button></div>
  </div>
</section>

<div class="footer">© ExcellentSMP</div>

<script>
const ip='excellentsmp.mineserver.uno';
function copyIP(){navigator.clipboard.writeText(ip);alert('Copied IP!')}
fetch('https://api.mcsrvstat.us/3/'+ip)
.then(r=>r.json())
.then(d=>{
 const el=document.getElementById('serverStatus');
 if(d.online){
  el.innerHTML=`🟢 Online | Players: ${d.players.online}/${d.players.max}`;
 } else {el.innerHTML='🔴 Offline'}
})
.catch(()=>document.getElementById('serverStatus').innerText='Status unavailable');
</script>
</body>
</html>
