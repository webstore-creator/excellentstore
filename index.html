<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Discord / Social Embed -->
<meta property="og:title" content="ExcellentSMP">
<meta property="og:description" content="Join ExcellentSMP! Buy ranks, items, and play survival with others.">
<meta property="og:image" content="https://yourdomain.com/thumbnail.png">
<meta property="og:url" content="https://yourdomain.com">
<meta name="theme-color" content="#9cff00">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExcellentSMP Store</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- CSS file (IMPORTANT) -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div>🟩 ExcellentSMP</div>
  <nav class="nav">
    <a href="#store">STORE</a>
    <a href="#status">STATUS</a>
    <a href="#join">HOW TO JOIN</a>
  </nav>
</header>

<section class="hero">
  <h1>EXCELLENT SMP</h1>
  <p>Pure survival • Real community • Endless adventure</p>
</section>

<section id="status" class="box">
  <h2>SERVER STATUS</h2>
  <p id="serverStatus">Checking server…</p>
</section>

<section id="store" class="box">
  <h2>REQUEST RANK PURCHASE</h2>
  <div class="grid">
    <div class="card">
      <input id="discord" placeholder="Discord username">
      <input id="minecraft" placeholder="Minecraft username">
      <select id="rank">
        <option>VIP - 0.99 GEL</option>
        <option>MVP - 4.99 GEL</option>
        <option>ELITE - 9.99 GEL</option>
        <option>LEGEND - 14.99 GEL</option>
      </select>
      <button onclick="sendRequest()">REQUEST</button>
    </div>
  </div>
</section>

<section class="box" id="items">
  <h2>ITEM SHOP</h2>
  <div class="grid">
    <div class="card">
      <img src="amethyst_pic.png" alt="Amethyst Pickaxe" class="item-img">
      <h3>Amethyst Pickaxe</h3>
      <div class="price">4.99 GEL</div>
      <input id="discord2" placeholder="Discord username">
      <input id="minecraft2" placeholder="Minecraft username">
      <button onclick="sendItem()">BUY ITEM</button>
    </div>
  </div>
</section>

<footer class="footer">© ExcellentSMP</footer>

<script src="script.js"></script>

  <script src="script.js"></script>

  <div id="popup" class="popup">
  <div class="popup-box">
    <h3>Purchase Request Sent</h3>
    <p>Go to Discord and create a ticket with your Discord name.</p>
    <a href="https://discord.com/channels/1350180904747794482" target="_blank">
      <button>Open Discord</button>
    </a>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

</body>
</html>
