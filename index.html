<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExcellentSMP Store</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020402;
  --panel:#0a120a;
  --green:#9cff00;
  --green2:#4fa800;
  --accent:#c8ff64;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Press Start 2P', monospace;
  color:var(--green);
  background:
    radial-gradient(circle at 25% 30%,#102710 0%,transparent 45%),
    radial-gradient(circle at 80% 70%,#0f260f 0%,transparent 45%),
    repeating-linear-gradient(0deg,#081508 0 2px,#030703 2px 4px),
    repeating-linear-gradient(90deg,#081508 0 2px,#030703 2px 4px);
}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:3px solid var(--green2);background:#030803}
.nav a{margin-left:12px;text-decoration:none;color:var(--green);border:2px solid var(--green2);padding:8px 10px;font-size:9px}
.nav a:hover{background:var(--green);color:black}
.hero{text-align:center;padding:70px 20px;background:radial-gradient(circle,#132f13,#020402 70%)}
.hero h1{font-size:48px;text-shadow:0 0 20px var(--green2)}
.box{max-width:1000px;margin:40px auto;padding:24px;border:3px solid var(--green2);background:var(--panel);box-shadow:0 0 20px #1cff0033}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px}
.card{border:3px solid var(--green2);padding:20px;background:#060e06;text-align:center}
input,select{width:100%;padding:10px;margin:6px 0;background:#020602;border:2px solid var(--green2);color:var(--green);font-family:inherit}
button{width:100%;margin-top:10px;background:none;border:2px solid var(--green);color:var(--green);padding:10px;cursor:pointer;font-family:inherit;font-size:9px}
button:hover{background:var(--green);color:black}
.footer{text-align:center;padding:20px;opacity:.6;font-size:9px}
</style>
</head>
<body>
<header>
<div>🟩 ExcellentSMP</div>
<div class="nav">
<a href="#store">STORE</a>
<a href="#status">STATUS</a>
</div>
</header>

<section class="hero">
<h1>EXCELLENT SMP</h1>
<p>Pure survival • Real community • Endless adventure</p>
</section>

<section id="status" class="box">
<h2>SERVER STATUS</h2>
<p id="serverStatus">Checking server…</p>
</section>

<section id="store" class="box">
<h2>REQUEST RANK PURCHASE</h2>
<div class="grid">
<div class="card">
<input id="discord" placeholder="Discord username (e.g. User#0001)">
<input id="minecraft" placeholder="Minecraft username">
<select id="rank">
<option>VIP - 0.99 GEL</option>
<option>MVP - 4.99 GEL</option>
<option>ELITE - 9.99 GEL</option>
<option>LEGEND - 14.99 GEL</option>
</select>
<button onclick="sendRequest()">REQUEST</button>
</div>
</div>
</section>

<section class="box">
<h2>ITEM SHOP</h2>
<div class="grid">
<div class="card">
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJQAAACUCAIAAAD6XpeDAAAIw0lEQVR4AeydW2xUVRSGB6EZKK2dmV" style="width:80px;image-rendering:pixelated"><br>
<h3>Amethyst Pickaxe</h3>
<div class="price">4.99 GEL</div>
<input id="discord2" placeholder="Discord username">
<input id="minecraft2" placeholder="Minecraft username">
<button onclick="sendItem()">BUY ITEM</button>
</div>
</div>
</section>

<div class="footer">© ExcellentSMP</div>

<script>
function sendItem(){
  const discord=document.getElementById('discord2').value;
  const mc=document.getElementById('minecraft2').value;
  if(!discord||!mc){alert('Fill all fields');return;}
  fetch(webhookURL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:`🛒 **Item Purchase**\nItem: Amethyst Pickaxe\nDiscord: ${discord}\nMinecraft: ${mc}\nPrice: 4.99 GEL`})});
  alert('Request sent!');
}
</script>

<script>
const webhookURL = "https://discord.com/api/webhooks/REPLACE_ME"; // IMPORTANT: replace this
const ip='excellentsmp.mineserver.uno';

function sendRequest(){
  const discord=document.getElementById('discord').value;
  const mc=document.getElementById('minecraft').value;
  const rank=document.getElementById('rank').value;
  if(!discord||!mc){alert('Fill all fields');return;}
  const payload={
    content:`🛒 **Purchase Request**\nDiscord: ${discord}\nMinecraft: ${mc}\nRank: ${rank}`
  };
  fetch(webhookURL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(()=>alert('Request sent! Check Discord.'))
  .catch(()=>alert('Failed to send.'));
}

fetch('https://api.mcsrvstat.us/3/'+ip)
.then(r=>r.json())
.then(d=>{
 document.getElementById('serverStatus').innerText=d.online?`🟢 Online • ${d.players.online}/${d.players.max}`:'🔴 Offline';
})
.catch(()=>document.getElementById('serverStatus').innerText='Unavailable');
</script>
</body>
</html>
